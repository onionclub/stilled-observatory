version: '3.8'

services:
  ghost:
    image: ghost:5-alpine
    container_name: stilled_ghost
    restart: unless-stopped
    environment:
      # Provide the exact URL the admin will be available at (e.g., https://admin.stilled.xyz)
      url: ${GHOST_URL:-http://localhost:2368}
      # Using SQLite3 to minimize memory overhead on a $6/mo DigitalOcean droplet (1GB RAM).
      # This is perfectly fine for a single operator headless CMS setup.
      database__client: sqlite3
      database__connection__filename: content/data/ghost.db
      database__useNullAsDefault: "true"
      database__debug: "false"
      NODE_ENV: production
    volumes:
      - ghost_data:/var/lib/ghost/content

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: stilled_cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - ghost

volumes:
  ghost_data:
